AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Enterprise Knowledge Base RAG — provisions S3, DynamoDB, OpenSearch Serverless,
  SNS, and the IAM role required by the application.

Parameters:
  ProjectName:
    Type: String
    Default: enterprise-kb-rag
    Description: Prefix applied to all resource names.

  OpenSearchCollectionName:
    Type: String
    Default: enterprise-knowledge-base
    Description: Name of the OpenSearch Serverless collection.

  BedrockGenerationModelId:
    Type: String
    Default: anthropic.claude-sonnet-4-6

  BedrockEmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0

Resources:

  # ── S3 ─────────────────────────────────────────────────────────────────────
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-documents-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA

  # ── DynamoDB ────────────────────────────────────────────────────────────────
  QueryHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-query-history"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: query_id
          AttributeType: S
        - AttributeName: conversation_id
          AttributeType: S
      KeySchema:
        - AttributeName: query_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: conversation_id-index
          KeySchema:
            - AttributeName: conversation_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── SNS ─────────────────────────────────────────────────────────────────────
  IngestionNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-ingestion-notifications"
      KmsMasterKeyId: alias/aws/sns

  # ── OpenSearch Serverless ───────────────────────────────────────────────────
  OpenSearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - OpenSearchEncryptionPolicy
      - OpenSearchNetworkPolicy
    Properties:
      Name: !Ref OpenSearchCollectionName
      Type: VECTORSEARCH
      Description: Vector store for the Enterprise Knowledge Base RAG system.

  OpenSearchEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${ProjectName}-encryption"
      Type: encryption
      Policy: !Sub |
        {
          "Rules": [
            {
              "ResourceType": "collection",
              "Resource": ["collection/${OpenSearchCollectionName}"]
            }
          ],
          "AWSOwnedKey": true
        }

  OpenSearchNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${ProjectName}-network"
      Type: network
      Policy: !Sub |
        [
          {
            "Rules": [
              {
                "ResourceType": "collection",
                "Resource": ["collection/${OpenSearchCollectionName}"]
              },
              {
                "ResourceType": "dashboard",
                "Resource": ["collection/${OpenSearchCollectionName}"]
              }
            ],
            "AllowFromPublic": false,
            "SourceVPCEs": []
          }
        ]

  OpenSearchDataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: !Sub "${ProjectName}-data-access"
      Type: data
      Policy: !Sub |
        [
          {
            "Rules": [
              {
                "ResourceType": "index",
                "Resource": ["index/${OpenSearchCollectionName}/*"],
                "Permission": [
                  "aoss:CreateIndex",
                  "aoss:DeleteIndex",
                  "aoss:UpdateIndex",
                  "aoss:DescribeIndex",
                  "aoss:ReadDocument",
                  "aoss:WriteDocument"
                ]
              },
              {
                "ResourceType": "collection",
                "Resource": ["collection/${OpenSearchCollectionName}"],
                "Permission": ["aoss:CreateCollectionItems"]
              }
            ],
            "Principal": ["${AppRole.Arn}"]
          }
        ]

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-app-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KBAppPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:HeadObject
                Resource:
                  - !GetAtt DocumentBucket.Arn
                  - !Sub "${DocumentBucket.Arn}/*"

              - Sid: BedrockAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                Resource: "*"

              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt QueryHistoryTable.Arn
                  - !Sub "${QueryHistoryTable.Arn}/index/*"

              - Sid: OpenSearchAccess
                Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource: !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"

              - Sid: TextractAccess
                Effect: Allow
                Action:
                  - textract:StartDocumentTextDetection
                  - textract:GetDocumentTextDetection
                Resource: "*"

              - Sid: ComprehendAccess
                Effect: Allow
                Action:
                  - comprehend:DetectEntities
                  - comprehend:DetectKeyPhrases
                Resource: "*"

              - Sid: SNSPublish
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref IngestionNotificationTopic

              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

Outputs:
  DocumentBucketName:
    Description: S3 bucket for document storage
    Value: !Ref DocumentBucket
    Export:
      Name: !Sub "${ProjectName}-document-bucket"

  QueryHistoryTableName:
    Description: DynamoDB table for query history
    Value: !Ref QueryHistoryTable
    Export:
      Name: !Sub "${ProjectName}-query-table"

  OpenSearchCollectionEndpoint:
    Description: OpenSearch Serverless collection endpoint
    Value: !GetAtt OpenSearchCollection.CollectionEndpoint
    Export:
      Name: !Sub "${ProjectName}-opensearch-endpoint"

  SNSTopicArn:
    Description: SNS topic for ingestion notifications
    Value: !Ref IngestionNotificationTopic
    Export:
      Name: !Sub "${ProjectName}-sns-topic"

  AppRoleArn:
    Description: IAM role ARN for the application
    Value: !GetAtt AppRole.Arn
    Export:
      Name: !Sub "${ProjectName}-app-role-arn"
